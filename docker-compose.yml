services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  sofia:
    build: .
    container_name: sofia-rag
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      # Pointe vers le service Ollama du compose, pas localhost
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      # Monte le PDF et l'index en dehors du container
      - ./rag/data:/app/rag/data
      - ./rag/index:/app/rag/index
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data: